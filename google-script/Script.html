<script>
/**
 * Drive Players — Google Apps Script Frontend
 * Version: 3.0.0
 *
 * SPA architecture: all navigation handled client-side via google.script.run
 */

/* ======================================================================
   STATE
   ====================================================================== */
const SIDEBAR_KEY = 'dp_sidebar_open';

let _state = {
  folderId: null,
  folderName: '',
  driveUrl: '',
  breadcrumb: [],     // [{id, name}]
  videos: [],
  subfolders: [],
  subfolderVideos: {}, // sfId → video[]
  allVideos: [],       // flat list of all videos
  currentVideo: null,
  currentVideoSubfolder: null
};

/* ======================================================================
   INITIALIZATION
   ====================================================================== */
document.addEventListener('DOMContentLoaded', function () {
  initKeyboardShortcuts();
  loadWatchHistory();

  // Allow Enter key on inputs
  ['landing-drive-input', 'header-drive-input'].forEach(function (id) {
    var el = document.getElementById(id);
    if (el) {
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          loadFolderFromInput(id);
        }
      });
    }
  });

  // Filter search
  var filterEl = document.getElementById('filter-input');
  if (filterEl) {
    filterEl.addEventListener('input', handleFilterSearch);
  }
});

/* ======================================================================
   NAVIGATION
   ====================================================================== */

/**
 * Load folder from input field
 */
function loadFolderFromInput(inputId) {
  var input = document.getElementById(inputId);
  if (!input || !input.value.trim()) return;

  var url = input.value.trim();

  showView('loading');
  document.getElementById('loading-text').textContent = 'Đang phân tích link...';

  google.script.run
    .withSuccessHandler(function (folderId) {
      if (!folderId) {
        showView('error');
        document.getElementById('error-message').textContent = 'Link không hợp lệ. Hãy dán link thư mục Google Drive.';
        return;
      }
      _state.driveUrl = url;
      _state.breadcrumb = [{ id: folderId, name: 'Root' }];
      loadFolder(folderId);
    })
    .withFailureHandler(function (err) {
      showView('error');
      document.getElementById('error-message').textContent = err.message || 'Lỗi không xác định';
    })
    .extractFolderId(url);
}

/**
 * Load a folder's contents
 */
function loadFolder(folderId) {
  _state.folderId = folderId;
  showView('loading');
  document.getElementById('loading-text').textContent = 'Đang tải danh sách video...';

  google.script.run
    .withSuccessHandler(function (result) {
      if (!result.success) {
        showView('error');
        document.getElementById('error-message').textContent = result.error;
        return;
      }

      _state.videos = result.videos;
      _state.subfolders = result.subfolders;
      _state.folderName = result.folderName;

      // Update root breadcrumb name
      if (_state.breadcrumb.length > 0 && _state.breadcrumb[0].name === 'Root') {
        _state.breadcrumb[0].name = result.folderName;
      }
      // Update last breadcrumb name
      if (_state.breadcrumb.length > 0) {
        _state.breadcrumb[_state.breadcrumb.length - 1].name = result.folderName;
      }

      // Now fetch subfolder videos if any
      if (result.subfolders.length > 0) {
        document.getElementById('loading-text').textContent =
          'Đang tải ' + result.subfolders.length + ' thư mục con...';
        var sfIds = result.subfolders.map(function (sf) { return sf.id; });
        google.script.run
          .withSuccessHandler(function (sfVideos) {
            _state.subfolderVideos = sfVideos || {};
            finishLoadFolder();
          })
          .withFailureHandler(function () {
            _state.subfolderVideos = {};
            finishLoadFolder();
          })
          .getSubfolderVideos(sfIds);
      } else {
        _state.subfolderVideos = {};
        finishLoadFolder();
      }
    })
    .withFailureHandler(function (err) {
      showView('error');
      document.getElementById('error-message').textContent = err.message || 'Lỗi không xác định';
    })
    .getFilesInFolder(folderId);
}

/**
 * After folder + subfolder data is loaded
 */
function finishLoadFolder() {
  // Build flat list
  _state.allVideos = _state.videos.slice();
  Object.keys(_state.subfolderVideos).forEach(function (sfId) {
    _state.allVideos = _state.allVideos.concat(_state.subfolderVideos[sfId]);
  });

  // Default to first video
  if (_state.allVideos.length > 0) {
    selectVideo(_state.allVideos[0]);
  } else {
    _state.currentVideo = null;
    _state.currentVideoSubfolder = null;
  }

  renderPlayerView();
  showView('player');
}

/**
 * Navigate into a subfolder
 */
function navigateToFolder(folderId, folderName) {
  // Push breadcrumb
  var existingIndex = -1;
  _state.breadcrumb.forEach(function (c, i) {
    if (c.id === folderId) existingIndex = i;
  });
  if (existingIndex >= 0) {
    _state.breadcrumb = _state.breadcrumb.slice(0, existingIndex + 1);
  } else {
    _state.breadcrumb.push({ id: folderId, name: folderName });
  }
  loadFolder(folderId);
}

/**
 * Go back to landing
 */
function goHome() {
  _state = {
    folderId: null, folderName: '', driveUrl: '',
    breadcrumb: [], videos: [], subfolders: [],
    subfolderVideos: {}, allVideos: [],
    currentVideo: null, currentVideoSubfolder: null
  };
  showView('landing');
  loadWatchHistory();
}

/* ======================================================================
   VIEW SWITCHING
   ====================================================================== */

function showView(view) {
  var body = document.getElementById('app-body');

  document.getElementById('landing-section').style.display   = view === 'landing' ? '' : 'none';
  document.getElementById('loading-section').style.display   = view === 'loading' ? '' : 'none';
  document.getElementById('error-section').style.display     = view === 'error'   ? '' : 'none';
  document.getElementById('player-layout').style.display     = view === 'player'  ? '' : 'none';
  document.getElementById('main-header').style.display       = (view === 'player' || view === 'error') ? '' : 'none';

  body.className = view === 'player' ? 'page-player' : 'page-landing';
}

/* ======================================================================
   RENDER PLAYER VIEW
   ====================================================================== */

function renderPlayerView() {
  renderBreadcrumb();
  renderVideoPlayer();
  renderVideoInfo();
  renderSidebar();
  updateHeaderInfo();
  initSidebarState();

  // Scroll to active
  setTimeout(function () {
    var active = document.querySelector('.video-item.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 350);
}

/* --- Breadcrumb --- */
function renderBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  if (_state.breadcrumb.length === 0) { bc.style.display = 'none'; return; }
  bc.style.display = '';

  var html = '<a href="javascript:void(0)" class="bc-home" title="Trang chủ" onclick="goHome()">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>';

  _state.breadcrumb.forEach(function (crumb, i) {
    html += '<span class="bc-sep"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></span>';
    var isLast = i === _state.breadcrumb.length - 1;
    if (isLast) {
      html += '<span class="bc-current">' + escHtml(crumb.name) + '</span>';
    } else {
      html += '<a href="javascript:void(0)" class="bc-link" onclick="navigateToFolder(\'' + crumb.id + '\',\'' + escAttr(crumb.name) + '\')">' + escHtml(crumb.name) + '</a>';
    }
  });

  // Show subfolder indicator
  if (_state.currentVideoSubfolder) {
    html += '<span class="bc-sep"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></span>';
    html += '<span class="bc-subfolder"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path></svg> ' + escHtml(_state.currentVideoSubfolder.name) + '</span>';
  }

  bc.innerHTML = html;
}

/* --- Video Player (iframe embed) --- */
function renderVideoPlayer() {
  var container = document.getElementById('video-container');
  var placeholder = document.getElementById('no-video-placeholder');

  if (!_state.currentVideo) {
    container.innerHTML = '';
    if (placeholder) container.appendChild(placeholder);
    if (placeholder) placeholder.style.display = '';
    return;
  }

  container.innerHTML = '<iframe class="video-iframe" id="video-iframe" src="' + _state.currentVideo.embed + '" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; fullscreen"></iframe>';
}

/* --- Video Info --- */
function renderVideoInfo() {
  var infoEl = document.getElementById('video-info');
  if (!_state.currentVideo) { infoEl.style.display = 'none'; return; }
  infoEl.style.display = '';

  var v = _state.currentVideo;
  document.getElementById('video-title').textContent = v.displayName || v.name;

  // Meta badges
  var metaHtml = '';
  if (v.resolution) metaHtml += '<span class="meta-badge quality">' + v.resolution + '</span>';
  if (v.duration) metaHtml += '<span class="meta-badge duration"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ' + v.duration + '</span>';
  if (v.size) metaHtml += '<span class="meta-badge size">' + v.size + '</span>';
  if (v.ext) metaHtml += '<span class="meta-badge ext">' + v.ext + '</span>';
  metaHtml += '<span class="meta-badge playback-mode">Google Drive Embed</span>';
  document.getElementById('video-meta').innerHTML = metaHtml;

  // Actions
  var actHtml = '';
  actHtml += '<a href="' + v.download + '" class="btn-action" target="_blank" rel="noopener"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span>Tải xuống</span></a>';
  actHtml += '<button class="btn-action" onclick="copyVideoLink(\'' + v.id + '\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg><span>Copy Link</span></button>';
  actHtml += '<a href="' + v.driveLink + '" class="btn-action" target="_blank" rel="noopener"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg><span>Mở Drive</span></a>';
  document.getElementById('video-actions').innerHTML = actHtml;
}

/* --- Sidebar --- */
function renderSidebar() {
  var list = document.getElementById('video-list');
  var html = '';

  // Collapsible subfolders
  _state.subfolders.forEach(function (folder, idx) {
    var sfVids = _state.subfolderVideos[folder.id] || [];
    var sfHasActive = false;
    if (_state.currentVideo) {
      sfVids.forEach(function (sv) {
        if (sv.id === _state.currentVideo.id) sfHasActive = true;
      });
    }

    html += '<div class="collapse-folder ' + (sfHasActive ? 'open' : '') + '" id="collapse-folder-' + idx + '" data-video-name="' + escAttr(folder.name.toLowerCase()) + '">';
    html += '<button class="collapse-folder-header" onclick="toggleCollapseFolder(this)" aria-expanded="' + (sfHasActive ? 'true' : 'false') + '">';
    html += '<div class="collapse-folder-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" fill="rgba(255,107,107,0.12)" stroke="#ff6b6b"></path></svg></div>';
    html += '<div class="collapse-folder-info"><span class="collapse-folder-name">' + escHtml(folder.name) + '</span><span class="collapse-folder-count">' + sfVids.length + ' video</span></div>';
    html += '<div class="collapse-folder-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></div>';
    html += '</button>';
    html += '<div class="collapse-folder-body"><div class="collapse-folder-inner">';

    if (sfVids.length === 0) {
      html += '<div class="collapse-folder-empty"><span>Không có video</span></div>';
    } else {
      sfVids.forEach(function (sv, svi) {
        var isActive = _state.currentVideo && _state.currentVideo.id === sv.id;
        html += buildVideoItemHtml(sv, svi, isActive);
      });
    }

    html += '</div></div></div>';
  });

  // Divider
  if (_state.subfolders.length > 0 && _state.videos.length > 0) {
    html += '<div class="list-divider" id="list-divider"><span>Video trong thư mục này</span></div>';
  }

  // Root videos
  _state.videos.forEach(function (video, index) {
    var isActive = _state.currentVideo && _state.currentVideo.id === video.id;
    html += buildVideoItemHtml(video, index, isActive);
  });

  // Empty
  if (_state.videos.length === 0 && _state.subfolders.length === 0) {
    html += '<div class="empty-folder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path></svg><p>Thư mục trống</p></div>';
  }

  list.innerHTML = html;

  // Folder name & count
  document.getElementById('sidebar-folder-name').textContent = _state.folderName || 'Danh sách';
  var parts = [];
  if (_state.allVideos.length > 0) parts.push(_state.allVideos.length + ' video');
  if (_state.subfolders.length > 0) parts.push(_state.subfolders.length + ' thư mục');
  document.getElementById('sidebar-count').textContent = parts.join(' · ') || 'Trống';

  // Show filter
  var searchEl = document.getElementById('sidebar-search');
  searchEl.style.display = (_state.allVideos.length > 0 || _state.subfolders.length > 0) ? '' : 'none';
}

function buildVideoItemHtml(video, index, isActive) {
  var html = '<a href="javascript:void(0)" class="video-item ' + (isActive ? 'active' : '') + '" onclick="onVideoItemClick(\'' + video.id + '\')" data-video-id="' + escAttr(video.id) + '" data-video-name="' + escAttr(video.name.toLowerCase()) + '">';
  html += '<div class="video-item-index">';
  if (isActive) {
    html += '<div class="playing-indicator"><span></span><span></span><span></span></div>';
  } else {
    html += (index + 1);
  }
  html += '</div>';
  html += '<div class="video-item-info">';
  html += '<h3 class="video-item-title">' + escHtml(video.displayName || video.name) + '</h3>';
  html += '<div class="video-item-meta">';
  if (video.duration) html += '<span class="item-duration"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ' + video.duration + '</span>';
  if (video.resolution) html += '<span class="item-resolution">' + video.resolution + '</span>';
  if (video.size) html += '<span class="item-size">' + video.size + '</span>';
  html += '</div></div></a>';
  return html;
}

/* --- Update header info --- */
function updateHeaderInfo() {
  var countEl = document.getElementById('video-count');
  var countText = document.getElementById('video-count-text');
  if (_state.allVideos.length > 0 || _state.subfolders.length > 0) {
    countEl.style.display = '';
    var txt = _state.allVideos.length + ' video';
    if (_state.subfolders.length > 0) txt += ' · ' + _state.subfolders.length + ' thư mục';
    countText.textContent = txt;
  } else {
    countEl.style.display = 'none';
  }

  // Header drive input
  var headerInput = document.getElementById('header-drive-input');
  if (headerInput) headerInput.value = _state.driveUrl;
}

/* ======================================================================
   VIDEO SELECTION
   ====================================================================== */

function selectVideo(video) {
  _state.currentVideo = video;

  // Detect which subfolder
  _state.currentVideoSubfolder = null;
  if (video) {
    _state.subfolders.forEach(function (sf) {
      var sfVids = _state.subfolderVideos[sf.id] || [];
      sfVids.forEach(function (sv) {
        if (sv.id === video.id) _state.currentVideoSubfolder = sf;
      });
    });
  }

  // Save to history
  if (video && _state.folderId) {
    google.script.run.saveHistory({
      video_id: video.id,
      video_name: video.name,
      duration: video.duration || '',
      resolution: video.resolution || '',
      size: video.size || '',
      folder_id: _state.folderId,
      folder_name: _state.folderName
    });
  }
}

function onVideoItemClick(videoId) {
  // Find video in allVideos
  var found = null;
  _state.allVideos.forEach(function (v) {
    if (v.id === videoId) found = v;
  });
  if (!found) return;

  selectVideo(found);
  renderPlayerView();
}

/* ======================================================================
   WATCH HISTORY
   ====================================================================== */

function loadWatchHistory() {
  google.script.run
    .withSuccessHandler(function (history) {
      renderHistory(history);
    })
    .withFailureHandler(function () {})
    .loadHistory();
}

function renderHistory(history) {
  var section = document.getElementById('history-section');
  var list = document.getElementById('history-list');

  if (!history || history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  var html = '';

  history.slice(0, 12).forEach(function (item) {
    var displayName = item.video_name;
    var dotIdx = displayName.lastIndexOf('.');
    if (dotIdx !== -1) displayName = displayName.substring(0, dotIdx);

    html += '<div class="history-item" onclick="restoreFromHistory(\'' + escAttr(item.folder_id) + '\',\'' + escAttr(item.video_id) + '\',\'' + escAttr(item.folder_name || 'Folder') + '\')">';
    html += '<div class="history-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>';
    html += '<div class="history-item-info">';
    html += '<span class="history-item-name">' + escHtml(displayName) + '</span>';
    html += '<span class="history-item-meta">';
    if (item.duration) html += '<span>' + item.duration + '</span>';
    if (item.resolution) html += '<span class="hi-res">' + item.resolution + '</span>';
    html += '<span class="hi-folder">📁 ' + escHtml(item.folder_name || '') + '</span>';
    if (item.timeAgo) html += '<span class="hi-time">' + item.timeAgo + '</span>';
    html += '</span></div></div>';
  });

  list.innerHTML = html;
}

function restoreFromHistory(folderId, videoId, folderName) {
  _state.driveUrl = folderId;
  _state.breadcrumb = [{ id: folderId, name: folderName || 'Folder' }];

  showView('loading');
  document.getElementById('loading-text').textContent = 'Đang tải lại thư mục...';

  google.script.run
    .withSuccessHandler(function (result) {
      if (!result.success) {
        showView('error');
        document.getElementById('error-message').textContent = result.error;
        return;
      }

      _state.folderId = folderId;
      _state.videos = result.videos;
      _state.subfolders = result.subfolders;
      _state.folderName = result.folderName;

      if (_state.breadcrumb.length > 0) {
        _state.breadcrumb[0].name = result.folderName;
      }

      if (result.subfolders.length > 0) {
        var sfIds = result.subfolders.map(function (sf) { return sf.id; });
        google.script.run
          .withSuccessHandler(function (sfVideos) {
            _state.subfolderVideos = sfVideos || {};
            finishRestoreHistory(videoId);
          })
          .withFailureHandler(function () {
            _state.subfolderVideos = {};
            finishRestoreHistory(videoId);
          })
          .getSubfolderVideos(sfIds);
      } else {
        _state.subfolderVideos = {};
        finishRestoreHistory(videoId);
      }
    })
    .withFailureHandler(function (err) {
      showView('error');
      document.getElementById('error-message').textContent = err.message;
    })
    .getFilesInFolder(folderId);
}

function finishRestoreHistory(videoId) {
  _state.allVideos = _state.videos.slice();
  Object.keys(_state.subfolderVideos).forEach(function (sfId) {
    _state.allVideos = _state.allVideos.concat(_state.subfolderVideos[sfId]);
  });

  // Find the target video
  var target = null;
  _state.allVideos.forEach(function (v) {
    if (v.id === videoId) target = v;
  });
  selectVideo(target || (_state.allVideos[0] || null));

  renderPlayerView();
  showView('player');
}

function doClearHistory() {
  if (!confirm('Xoá toàn bộ lịch sử xem?')) return;
  google.script.run
    .withSuccessHandler(function () {
      document.getElementById('history-section').style.display = 'none';
      showToast('🗑️ Đã xoá lịch sử xem');
    })
    .clearHistory();
}

/* ======================================================================
   SIDEBAR TOGGLE
   ====================================================================== */

function initSidebarState() {
  var saved = localStorage.getItem(SIDEBAR_KEY);
  var isOpen = saved === null ? true : saved === '1';
  var layout = document.getElementById('player-layout');
  var body = document.getElementById('app-body');
  if (!isOpen && layout) {
    layout.classList.add('sidebar-closed');
    body.classList.add('sidebar-is-closed');
  }
}

function openSidebar() {
  var layout = document.getElementById('player-layout');
  var body = document.getElementById('app-body');
  if (layout) layout.classList.remove('sidebar-closed');
  body.classList.remove('sidebar-is-closed');
  localStorage.setItem(SIDEBAR_KEY, '1');
}

function closeSidebar() {
  var layout = document.getElementById('player-layout');
  var body = document.getElementById('app-body');
  if (layout) layout.classList.add('sidebar-closed');
  body.classList.add('sidebar-is-closed');
  localStorage.setItem(SIDEBAR_KEY, '0');
}

function toggleSidebar() {
  var layout = document.getElementById('player-layout');
  if (!layout) return;
  layout.classList.contains('sidebar-closed') ? openSidebar() : closeSidebar();
}

/* ======================================================================
   COLLAPSE FOLDER TOGGLE
   ====================================================================== */

function toggleCollapseFolder(headerBtn) {
  var folder = headerBtn.closest('.collapse-folder');
  if (!folder) return;
  var isOpen = folder.classList.toggle('open');
  headerBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

/* ======================================================================
   FILTER SEARCH
   ====================================================================== */

function handleFilterSearch(e) {
  var query = e.target.value.toLowerCase().trim();
  var divider = document.getElementById('list-divider');
  var visibleVideos = 0;
  var visibleFolders = 0;

  // Root-level video items
  document.querySelectorAll('#video-list > .video-item').forEach(function (item) {
    var name = item.dataset.videoName || '';
    var matches = !query || name.indexOf(query) !== -1;
    item.style.display = matches ? '' : 'none';
    if (matches) visibleVideos++;
  });

  // Collapse folders
  document.querySelectorAll('.collapse-folder').forEach(function (folder) {
    var folderName = folder.dataset.videoName || '';
    var folderMatches = !query || folderName.indexOf(query) !== -1;
    var anyVideoMatch = false;

    folder.querySelectorAll('.video-item').forEach(function (item) {
      var name = item.dataset.videoName || '';
      var matches = !query || name.indexOf(query) !== -1;
      item.style.display = matches ? '' : 'none';
      if (matches) anyVideoMatch = true;
    });

    var showFolder = folderMatches || anyVideoMatch;
    folder.style.display = showFolder ? '' : 'none';

    if (folderMatches && query) {
      folder.querySelectorAll('.video-item').forEach(function (item) { item.style.display = ''; });
    }
    if (query && showFolder) folder.classList.add('open');
    if (showFolder) visibleFolders++;
  });

  if (divider) {
    divider.style.display = (visibleFolders === 0 || visibleVideos === 0) ? 'none' : '';
  }
}

/* ======================================================================
   KEYBOARD SHORTCUTS
   ====================================================================== */

function initKeyboardShortcuts() {
  document.addEventListener('keydown', function (e) {
    if (isInputFocused()) return;

    // '/' — focus search
    if (e.key === '/') {
      e.preventDefault();
      var input = document.getElementById('filter-input') || document.getElementById('landing-drive-input');
      if (input) input.focus();
    }

    // 'b' — toggle sidebar
    if (e.key === 'b' || e.key === 'B') {
      toggleSidebar();
    }

    // 'Escape' — blur
    if (e.key === 'Escape') {
      document.activeElement && document.activeElement.blur();
    }
  });
}

/* ======================================================================
   COPY LINK
   ====================================================================== */

function copyVideoLink(videoId) {
  var url = 'https://drive.google.com/file/d/' + videoId + '/view';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url)
      .then(function () { showToast('✅ Đã copy link video!'); })
      .catch(function () { fallbackCopy(url); });
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✅ Đã copy link video!');
  } catch (e) {
    showToast('Không thể copy link');
  }
  document.body.removeChild(ta);
}

/* ======================================================================
   TOAST
   ====================================================================== */

function showToast(message, duration) {
  duration = duration || 3000;
  var toast = document.getElementById('toast');
  var msg = document.getElementById('toast-message');
  if (!toast || !msg) return;
  msg.textContent = message;
  toast.classList.add('show');
  clearTimeout(window._toastTimeout);
  window._toastTimeout = setTimeout(function () { toast.classList.remove('show'); }, duration);
}

/* ======================================================================
   UTILITY
   ====================================================================== */

function isInputFocused() {
  var el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
}

function escHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

function escAttr(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
