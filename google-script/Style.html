<style>
/* ==========================================================================
   Drive Players — Google Apps Script Edition
   Version: 3.0.0
   Premium dark theme with coral accents
   ========================================================================== */

/* ---------- CSS Variables ---------- */
:root {
    --bg-primary: #0f0f0f;
    --bg-secondary: #1a1a1a;
    --bg-tertiary: #242424;
    --bg-hover: #2a2a2a;
    --bg-active: #3a1a1a;

    --text-primary: #f1f1f1;
    --text-secondary: #aaaaaa;
    --text-muted: #717171;

    --accent: #ff4444;
    --accent-hover: #ff6666;
    --accent-glow: rgba(255, 68, 68, 0.3);
    --accent-gradient: linear-gradient(135deg, #ff6b6b, #ee5a24);

    --border-color: #303030;
    --border-subtle: #222222;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;

    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 20px var(--accent-glow);

    --header-height: 60px;
    --sidebar-width: 420px;

    --transition-fast: 0.15s ease;
    --transition-normal: 0.25s ease;
    --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ---------- Reset ---------- */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
img { display:block; max-width:100%; }
button { border:none; background:none; cursor:pointer; font-family:inherit; color:inherit; }
input { font-family:inherit; border:none; outline:none; }

/* ---------- Scrollbar ---------- */
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg-tertiary); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:#555; }

/* ---------- Header ---------- */
.header { position:fixed; top:0; left:0; right:0; height:var(--header-height); display:flex; align-items:center; padding:0 16px; gap:16px; z-index:100; backdrop-filter:blur(12px); background:rgba(26,26,26,0.92); border-bottom:1px solid var(--border-subtle); }
.header-left { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.logo { display:flex; align-items:center; gap:8px; transition:opacity var(--transition-fast); cursor:pointer; }
.logo:hover { opacity:0.85; }
.logo-icon { display:flex; align-items:center; justify-content:center; }
.logo-text { font-size:18px; font-weight:700; letter-spacing:-0.5px; white-space:nowrap; }
.logo-accent { color:var(--accent); }
.logo-version { font-size:10px; font-weight:600; color:var(--text-muted); background:var(--bg-tertiary); padding:2px 6px; border-radius:4px; letter-spacing:0.3px; margin-left:2px; line-height:1; display:inline-flex; align-items:center; }

/* ---------- Search Bar ---------- */
.search-bar { flex:1; max-width:640px; margin:0 auto; }
.search-input-wrapper { display:flex; align-items:center; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:40px; overflow:hidden; transition:border-color var(--transition-fast), box-shadow var(--transition-fast); }
.search-input-wrapper:focus-within { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.search-input { flex:1; height:40px; padding:0 16px; background:transparent; color:var(--text-primary); font-size:14px; }
.search-input::placeholder { color:var(--text-muted); }
.search-btn { width:56px; height:40px; display:flex; align-items:center; justify-content:center; background:var(--bg-tertiary); color:var(--text-secondary); border-left:1px solid var(--border-color); transition:background var(--transition-fast), color var(--transition-fast); }
.search-btn:hover { background:var(--accent); color:white; }

/* ---------- Header Right ---------- */
.header-right { flex-shrink:0; }
.video-count { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); padding:6px 12px; background:var(--bg-tertiary); border-radius:20px; white-space:nowrap; }

/* ---------- Main Content ---------- */
.main-content { min-height:100vh; padding-bottom:env(safe-area-inset-bottom); }
.page-landing .main-content { padding-top:0; }
.page-player .main-content { padding-top:var(--header-height); }

/* ---------- Landing Section ---------- */
.landing { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
.landing-content { text-align:center; max-width:600px; width:100%; animation:fadeInUp 0.6s ease forwards; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
.landing-icon { margin-bottom:24px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
.landing-title { font-size:48px; font-weight:800; letter-spacing:-2px; margin-bottom:12px; background:linear-gradient(135deg, var(--text-primary) 40%, var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.text-accent { background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.landing-version { display:inline-block; font-size:12px; font-weight:600; color:var(--accent); background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.25); padding:3px 10px; border-radius:20px; letter-spacing:0.5px; margin-bottom:12px; }
.landing-subtitle { font-size:16px; color:var(--text-secondary); margin-bottom:16px; line-height:1.6; }
.landing-guide { font-size:13px; color:var(--text-muted); line-height:1.9; margin-bottom:32px; opacity:0.85; }

/* ---------- Landing Form ---------- */
.landing-form { margin-bottom:32px; }
.landing-input-group { display:flex; gap:12px; align-items:center; }
.landing-input { flex:1; height:52px; padding:0 20px; background:var(--bg-secondary); border:2px solid var(--border-color); border-radius:var(--radius-md); color:var(--text-primary); font-size:15px; transition:border-color var(--transition-fast), box-shadow var(--transition-fast); }
.landing-input:focus { border-color:var(--accent); box-shadow:var(--shadow-glow); }
.landing-input::placeholder { color:var(--text-muted); }
.landing-submit { display:flex; align-items:center; gap:8px; height:52px; padding:0 24px; background:var(--accent-gradient); color:white; font-size:15px; font-weight:600; border-radius:var(--radius-md); white-space:nowrap; transition:transform var(--transition-fast), box-shadow var(--transition-fast); }
.landing-submit:hover { transform:translateY(-2px); box-shadow:var(--shadow-glow); }
.landing-submit:active { transform:translateY(0); }

/* ---------- Watch History ---------- */
.history-section { width:100%; max-width:600px; margin-top:36px; text-align:left; }
.history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.history-title { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; color:var(--text-primary); }
.history-clear { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); padding:4px 10px; border-radius:6px; background:var(--bg-tertiary); transition:color var(--transition-fast), background var(--transition-fast); cursor:pointer; border:none; font-family:inherit; }
.history-clear:hover { color:var(--accent); background:rgba(255,68,68,0.1); }
.history-list { display:flex; flex-direction:column; gap:2px; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-md); overflow:hidden; }
.history-item { display:flex; align-items:center; gap:12px; padding:10px 14px; transition:background var(--transition-fast); border-left:3px solid transparent; cursor:pointer; }
.history-item:hover { background:var(--bg-hover); border-left-color:var(--accent); }
.history-item-icon { display:flex; align-items:center; justify-content:center; width:32px; height:32px; flex-shrink:0; border-radius:50%; background:rgba(255,68,68,0.12); color:var(--accent); }
.history-item-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.history-item-name { font-size:13px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-item-meta { display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:11px; color:var(--text-muted); }
.hi-res { font-size:10px; font-weight:600; color:var(--accent); padding:1px 4px; border:1px solid rgba(255,68,68,0.3); border-radius:3px; }
.hi-folder { color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
.hi-time { color:var(--text-muted); opacity:0.7; margin-left:auto; white-space:nowrap; }

/* ---------- Loading ---------- */
.loading-section { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
.loading-content { text-align:center; animation:fadeInUp 0.4s ease; }
.loading-spinner { width:48px; height:48px; border:4px solid var(--border-color); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:15px; color:var(--text-secondary); }

/* ---------- Error ---------- */
.error-section { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - var(--header-height)); padding:40px 20px; }
.error-content { text-align:center; max-width:500px; animation:fadeInUp 0.5s ease; }
.error-icon { font-size:64px; margin-bottom:20px; }
.error-content h2 { font-size:24px; margin-bottom:12px; }
.error-message { color:var(--text-secondary); font-size:14px; line-height:1.6; margin-bottom:24px; }
.btn-retry { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:var(--accent-gradient); color:white; font-weight:600; border-radius:var(--radius-md); transition:transform var(--transition-fast), box-shadow var(--transition-fast); cursor:pointer; border:none; font-family:inherit; font-size:15px; }
.btn-retry:hover { transform:translateY(-2px); box-shadow:var(--shadow-glow); }

/* ---------- Player Layout ---------- */
.player-layout { display:flex; gap:0; padding:24px; max-width:1800px; margin:0 auto; animation:fadeInUp 0.5s ease; transition:padding var(--transition-slow); }
.player-layout.sidebar-closed { max-width:1200px; }
.player-layout.sidebar-closed .sidebar { width:0; min-width:0; padding:0; border:none; overflow:hidden; opacity:0; pointer-events:none; }

.player-main { flex:1 1 0; min-width:0; width:0; transition:flex var(--transition-slow); }

/* ---------- Video Container ---------- */
.video-container { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-lg); }
.video-iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:block; border-radius:var(--radius-lg); }
.folder-only-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:16px; color:var(--text-muted); }
.folder-only-placeholder p { font-size:14px; text-align:center; line-height:1.6; }

/* ---------- Video Info ---------- */
.video-info { padding:16px 4px; }
.video-title { font-size:20px; font-weight:700; letter-spacing:-0.3px; line-height:1.4; margin-bottom:12px; }
.video-meta { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.meta-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; font-size:12px; font-weight:500; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-secondary); white-space:nowrap; }
.meta-badge.quality { background:rgba(255,68,68,0.12); color:var(--accent); border-color:rgba(255,68,68,0.25); font-weight:700; }
.meta-badge.playback-mode { background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.25); }

/* ---------- Video Actions ---------- */
.video-actions { display:flex; flex-wrap:wrap; gap:8px; }
.btn-action { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; font-size:13px; font-weight:500; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:var(--radius-sm); color:var(--text-secondary); transition:all var(--transition-fast); cursor:pointer; text-decoration:none; }
.btn-action:hover { background:var(--bg-hover); color:var(--text-primary); border-color:var(--accent); }

/* ---------- Breadcrumb ---------- */
.breadcrumb { display:flex; align-items:center; gap:4px; padding:10px 4px 14px; font-size:13px; flex-wrap:wrap; }
.bc-home { display:flex; align-items:center; color:var(--text-muted); transition:color var(--transition-fast); cursor:pointer; }
.bc-home:hover { color:var(--accent); }
.bc-sep { display:flex; align-items:center; color:var(--text-muted); opacity:0.5; }
.bc-link { color:var(--text-secondary); transition:color var(--transition-fast); cursor:pointer; }
.bc-link:hover { color:var(--accent); }
.bc-current { color:var(--text-primary); font-weight:600; }
.bc-subfolder { display:inline-flex; align-items:center; gap:4px; color:var(--accent); font-weight:500; font-size:12px; }

/* ---------- Sidebar ---------- */
.sidebar { width:var(--sidebar-width); min-width:var(--sidebar-width); margin-left:16px; border-left:1px solid var(--border-subtle); display:flex; flex-direction:column; max-height:calc(100vh - var(--header-height) - 48px); position:sticky; top:calc(var(--header-height) + 24px); transition:width var(--transition-slow), min-width var(--transition-slow), opacity var(--transition-slow), margin var(--transition-slow); overflow:hidden; }

/* Sidebar open button (visible when sidebar is closed) */
.sidebar-open-btn { display:none; position:fixed; bottom:24px; right:24px; z-index:90; padding:10px 18px; background:var(--accent-gradient); color:white; font-size:13px; font-weight:600; border-radius:40px; box-shadow:var(--shadow-md), var(--shadow-glow); align-items:center; gap:8px; transition:transform var(--transition-fast); cursor:pointer; border:none; font-family:inherit; }
.sidebar-open-btn:hover { transform:translateY(-2px); }
.player-layout.sidebar-closed ~ .sidebar-open-btn,
.sidebar-closed .sidebar-open-btn { display:flex !important; }
body.sidebar-is-closed .sidebar-open-btn { display:flex !important; }

.sidebar-header { display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border-subtle); }
.sidebar-title-wrap { flex:1; min-width:0; }
.sidebar-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:600; }
.sidebar-folder-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-count { display:block; font-size:12px; color:var(--text-muted); margin-top:2px; }
.sidebar-toggle-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; flex-shrink:0; transition:background var(--transition-fast); cursor:pointer; }
.sidebar-toggle-btn:hover { background:var(--bg-tertiary); }

.sidebar-search { padding:8px 12px; border-bottom:1px solid var(--border-subtle); }
.filter-input { width:100%; height:36px; padding:0 12px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:var(--radius-sm); color:var(--text-primary); font-size:13px; transition:border-color var(--transition-fast); }
.filter-input:focus { border-color:var(--accent); }
.filter-input::placeholder { color:var(--text-muted); }

/* ---------- Video List ---------- */
.video-list { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:16px; }

/* Video item */
.video-item { display:flex; align-items:center; gap:10px; padding:8px 12px; transition:background var(--transition-fast); cursor:pointer; border-left:3px solid transparent; text-decoration:none; color:inherit; }
.video-item:hover { background:var(--bg-hover); }
.video-item.active { background:var(--bg-active); border-left-color:var(--accent); }

.video-item-index { width:28px; flex-shrink:0; text-align:center; font-size:12px; font-weight:500; color:var(--text-muted); }
.video-item.active .video-item-index { color:var(--accent); }

.playing-indicator { display:flex; align-items:flex-end; justify-content:center; gap:2px; height:16px; }
.playing-indicator span { display:block; width:3px; background:var(--accent); border-radius:1px; animation:eq 0.6s ease infinite; }
.playing-indicator span:nth-child(1) { animation-delay:-0.2s; height:8px; }
.playing-indicator span:nth-child(2) { animation-delay:-0.1s; height:12px; }
.playing-indicator span:nth-child(3) { height:6px; }
@keyframes eq { 0%,100%{ transform:scaleY(0.5); } 50%{ transform:scaleY(1); } }

.video-item-info { flex:1; min-width:0; }
.video-item-title { font-size:13px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:0; }
.video-item-meta { display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:3px; font-size:11px; color:var(--text-muted); }
.item-duration { display:inline-flex; align-items:center; gap:3px; }
.item-resolution { font-weight:600; color:var(--accent); }
.item-size { color:var(--text-muted); }
.item-date { color:var(--text-muted); opacity:0.7; }

/* ---------- Collapse Folder ---------- */
.collapse-folder { border-bottom:1px solid var(--border-subtle); }
.collapse-folder-header { display:flex; align-items:center; gap:10px; width:100%; padding:10px 12px; cursor:pointer; transition:background var(--transition-fast); border:none; background:none; font-family:inherit; color:inherit; text-align:left; }
.collapse-folder-header:hover { background:var(--bg-hover); }
.collapse-folder-icon { display:flex; align-items:center; justify-content:center; width:28px; flex-shrink:0; }
.collapse-folder-info { flex:1; min-width:0; }
.collapse-folder-name { display:block; font-size:13px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.collapse-folder-count { display:block; font-size:11px; color:var(--text-muted); margin-top:1px; }
.collapse-folder-chevron { display:flex; align-items:center; justify-content:center; width:24px; flex-shrink:0; color:var(--text-muted); transition:transform var(--transition-normal); }
.collapse-folder.open .collapse-folder-chevron { transform:rotate(180deg); }
.collapse-folder-body { max-height:0; overflow:hidden; transition:max-height var(--transition-slow); }
.collapse-folder.open .collapse-folder-body { max-height:5000px; }
.collapse-folder-inner { padding:0 0 4px 0; }
.collapse-folder-empty { padding:12px; text-align:center; font-size:12px; color:var(--text-muted); }

/* ---------- Divider ---------- */
.list-divider { display:flex; align-items:center; padding:12px 16px 8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); opacity:0.7; }

/* ---------- Empty Folder ---------- */
.empty-folder { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:12px; color:var(--text-muted); }
.empty-folder p { font-size:14px; }

/* ---------- Toast ---------- */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--bg-tertiary); color:var(--text-primary); padding:12px 24px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; box-shadow:var(--shadow-lg); border:1px solid var(--border-color); z-index:9999; opacity:0; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ============================== RESPONSIVE ============================== */
@media (max-width: 1024px) {
  .sidebar { width:340px; min-width:340px; }
}

@media (max-width: 768px) {
  .header { padding:0 10px; gap:8px; }
  .search-bar { display:none; }
  .video-count { display:none !important; }
  .logo-text { font-size:15px; }
  .logo-version { display:none; }

  .landing-title { font-size:32px; }
  .landing-input-group { flex-direction:column; }
  .landing-input { width:100%; }
  .landing-submit { width:100%; justify-content:center; }

  .player-layout { flex-direction:column; padding:12px; gap:12px; }
  .player-layout.sidebar-closed { max-width:100%; }

  .sidebar { width:100% !important; min-width:100% !important; margin-left:0; border-left:none; border-top:1px solid var(--border-subtle); max-height:50vh; position:relative; top:0; }

  .sidebar-open-btn { bottom:16px; right:16px; font-size:12px; padding:8px 14px; }

  .video-title { font-size:16px; }
  .video-actions { gap:6px; }
  .btn-action { padding:6px 12px; font-size:12px; }
  .btn-action span { display:none; }

  .breadcrumb { padding:6px 0 10px; font-size:12px; }
}

@media (max-width: 480px) {
  .landing { padding:20px 16px; }
  .landing-title { font-size:28px; letter-spacing:-1px; }
  .landing-subtitle { font-size:14px; }
  .sidebar { max-height:40vh; }
}
</style>
